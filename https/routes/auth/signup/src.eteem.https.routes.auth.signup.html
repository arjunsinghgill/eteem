<!DOCTYPE html>
<html>
  <head>
    <title>ASG | eteem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Arjun Singh Gill Portfolio | eteem">
    <link rel="stylesheet" type="text/css" href="/css/auth/signup">
  </head>
  <body>
    <h1 class="title_main"><a class="title_main" href="/">eteem</a></h1>
    <p id="tagline">end-to-end encrypted messenger</p>
    <br>
    <form id="submit_form" action="/js/auth/signup">
      <input class="form_text_input" type="text" id="first_name" name="first_name" placeholder="first name"><br>
      <input class="form_text_input" type="text" id="middle_name" name="middle_name" placeholder="middle name"><br>
      <input class="form_text_input" type="text" id="last_name" name="last_name" placeholder="last name"><br>
      <input class="form_text_input" type="email" id="email" name="email" placeholder="email"><br>
      <input class="form_text_input" type="text" id="username" name="username" placeholder="username"><br>
      <input class="form_text_input" type="password" id="password" name="password" placeholder="password"><br>
      <input class="form_text_input" type="password" id="re_password" name="re_password" placeholder="renter password"><br>
      <input class="form_text_input" type="date" id="dob" name="dob" placeholder="date of birth"><br>
      <input class="form_text_input" type="text" id="passphrase" name="passphrase" placeholder="passphrase"><br>
      <label class="form_label_dob" for="dob">( date of birth )</label><br>
    <br>
      <button id="signup" type="submit" >signup</button>
    </form>
    <br>
    <br>
    <br>
    <script type="module" src='/js/auth/signup'></script>
  </body>
</html>
